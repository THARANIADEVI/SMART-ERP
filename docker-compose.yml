version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smarterp
      POSTGRES_PASSWORD: smarterp
      POSTGRES_DB: smarterp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://smarterp:smarterp@db:5432/smarterp
volumes:
  db_data:
